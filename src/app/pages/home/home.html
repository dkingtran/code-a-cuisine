
<div class="main-content">
    <div class="hero-title">
        <h2>
            AI-Powered recipe generator
        </h2>
        <h1>
            Code à Cuisine
        </h1>
        <button class="primary-btn-creme" routerLink="/generate">
            Get started
        </button>
    </div>
    <div class="hero-images">
        @for (image of heroImages(); track image.src) {
            <img [src]="image.src" [style.z-index]="image.zIndex" alt="Hero ellipse">
        }
    </div>
    <div class="bottom-text">
        <p>Hungry for inspiration?</p>
        <button class="bottom-btn action-arrow-btn" routerLink="/cookbook">
            Go to cookbook 
            <app-svg-icon name="forward-btn-creme" [width]="26" [height]="15" />
        </button>
    </div>
</div>
