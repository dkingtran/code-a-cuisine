<div class="main-content">
  <div class="header">
    <div class="header-left">
      <h1 class="desktop-view">The recipe results</h1>
      <h1 class="mobile-view">Generated recipes</h1>
      <p>We took what you have and let our AI do the thinking. Here are 3 easy recipes you can make right now!</p>
      <div class="tags">(tags btn, zum Beispiel: italian und quick)</div>
    </div>
    <div class="header-right">
      <div class="header-img">
        <img src="/assets/img/results/visual.png" alt="Illustration of a chef holding a dish" class="header-image">
      </div>
    </div>
  </div>
  @for (recipe of recipes(); track recipe.id) {
    <div class="recipe-card">
      <h3>{{ recipe.title }}</h3>
      <p>{{ recipe.description }}</p>
      <button type="button" class="btn" (click)="openRecipe(recipe.id)">View</button>
    </div>
  }

  <button type="button" class="generate-btn action-arrow-btn" (click)="goToGenerate()">
    Generate New Recipe
    <app-svg-icon name="forward-btn-creme" [width]="26" [height]="15" />
  </button>
</div>
